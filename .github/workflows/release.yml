name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Build ZIP + SHA-256 and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install production dependencies (bundle ws into ZIP)
        working-directory: 01-程序/edge-phone-cdp-inherit-live
        run: npm ci --omit=dev
      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION="$(node -p "require('./01-程序/edge-phone-cdp-inherit-live/package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) != tag ($TAG_VERSION)"; exit 1
          fi
          echo "Version $PKG_VERSION matches tag."
      - name: Build release package
        run: node scripts/package-release.mjs dist
      - name: Show artifacts
        run: ls -la dist
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.zip.sha256.txt
          fail_on_unmatched_files: true
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: |
            dist/*.zip
            dist/*.zip.sha256.txt
