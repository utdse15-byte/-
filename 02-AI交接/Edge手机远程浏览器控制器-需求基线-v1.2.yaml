schema_version: '1.2'
date: '2026-07-19'
project:
  name: Edge 手机远程浏览器控制器
  implementation_version: 6.8.0
  purpose: Android 手机实时查看并人工操作 Windows 原 Microsoft Edge 网页内容
  primary_sites:
  - chatgpt.com
  - claude.ai
immutable:
  browser: Microsoft Edge
  proxy_server: http://127.0.0.1:7897
  proxy_arguments:
  - --proxy-server="http://127.0.0.1:7897"
  - --host-resolver-rules="MAP * 0.0.0.0, EXCLUDE 127.0.0.1"
  - --dns-prefetch-disable
  - --disable-quic
  - --force-webrtc-ip-handling-policy=disable_non_proxied_udp
  proxy_must_not_change: true
  proxy_failure_policy: fail_closed_no_direct_fallback
  inherit_original_edge_profile: true
  isolated_user_data_dir_forbidden: true
  whole_desktop_remote_control_not_primary: true
  phone_dedicated_window_optional: true
strict_manual_mode:
  mode: auto
  domains:
  - chatgpt.com
  - chat.openai.com
  - auth.openai.com
  - claude.ai
  - claude.com
  broad_domains_forbidden:
  - openai.com
  - anthropic.com
  real_desktop_identity: true
  real_window_size:
    width: 560
    height: 960
  default_input: mouse_wheel_keyboard
  native_touch: explicit_temporary_only
  idle_cdp_domains:
  - Target
  - Page
  - Input
  runtime: explicit_audit_only
  dom: explicit_feature_only
  file_chooser:
    arm_by_user: true
    toolbar_arm_ms: 90000
    disable_after_transaction: true
  calibration_overlay: phone_controller_only
desktop_tab_follow:
  enabled: true
  strategy: windows_ui_automation
  poll_ms: 850
  runtime_fallback_in_strict_mode: false
  ambiguous_match: keep_current_target
  non_edge_foreground: keep_current_target
general_mode:
  default_gesture: direct_touch_and_drag
  default_injection: native_touch
  mobile_layout_available: true
  calibration_profiles:
  - windowed_portrait
  - windowed_landscape
  - fullscreen_portrait
  - fullscreen_landscape
computer_files:
  default_source: windows_computer
  default_sort: modified-desc
  requires_explicit_selection: true
  direct_original_path_to_edge: true
clipboard_bridge:
  enabled: true
  direction: bidirectional
  trigger: explicit_single_shot
  polling: false
  auto_sync: false
  mechanism: powershell_get_set_clipboard
  persists_to_disk: false
  logs_content: false
  oversize_policy: reject_no_truncate
dedicated_window:
  default: disabled
  same_profile: true
  main_window_untouched: true
  tab_panel_scope: dedicated_window_only
  tab_follow_scope: dedicated_window_only
  ambiguous_match: keep_current_target
  participates_in_strict_window_restore: false
idle_sharpen:
  enabled: true
  delay_ms: 1500
  format: png_lossless
  uses_only_page_domain: true
  activates_window: false
  enables_runtime_or_dom: false
  injects_page_content: false
  loops: false
prohibited:
- headless automation
- Selenium/Playwright/Puppeteer/WebDriver business automation
- automatic prompt sending or retry
- response scraping or bulk export
- CAPTCHA or rate-limit bypass
- fingerprint spoofing or stealth plugins
- randomized human-like behavior
- multi-account bulk operation
requirements:
- id: ENV-001
  level: MUST
  category: 运行环境
  text: 电脑端为 Windows 10/11，手机端为 Android；手机通过普通手机浏览器访问控制页。
  implementation: 按规范保持
  evidence: 见程序与测试
- id: BRW-001
  level: MUST
  category: 浏览器
  text: 受控浏览器必须是 Microsoft Edge，并使用用户当前实际安装的 Edge 稳定版路径或配置路径。
  implementation: 按规范保持
  evidence: 见程序与测试
- id: NET-001
  level: MUST
  category: 固定代理
  text: 本地代理 http://127.0.0.1:7897 及 DNS/QUIC/WebRTC 参数为不可变硬约束，不得删除、替换、轮换、绕过或建议关闭。
  implementation: 已实现
  evidence: config.json；2-启动Edge和控制器.ps1；项目完整性测试逐项检查五个参数
- id: NET-002
  level: MUST
  category: 故障关闭
  text: 代理不可用时不得静默回退为直连；应明确提示并保持访问失败。
  implementation: 已实现/需 Windows 验证
  evidence: 启动前代理端口检查；无直连回退配置
- id: PROF-001
  level: MUST
  category: 原配置继承
  text: 不得创建隔离 user-data-dir；必须继承原 Edge 配置的 Cookie、登录、扩展、收藏夹、历史和网站权限。
  implementation: 已实现/需 Windows 验证
  evidence: 启动脚本不使用隔离 user-data-dir；读取原 Edge profileDirectory
- id: ARCH-001
  level: MUST
  category: 控制范围
  text: 手机主要查看并操作 Edge 网页内容，不把整个 Windows 桌面缩小到手机上。
  implementation: 按规范保持
  evidence: 见程序与测试
- id: ARCH-002
  level: MUST
  category: 本地中转
  text: 手机只连接 Windows 控制器；Edge 动态 CDP 端口只允许 127.0.0.1 访问，不得向局域网或公网开放。
  implementation: 已实现
  evidence: 控制器监听 8765；CDP 仅通过 127.0.0.1 的 DevToolsActivePort 连接
- id: ARCH-003
  level: MUST
  category: 真实会话
  text: 站点看到的仍是电脑原 Edge 会话；手机控制页不另外登录 ChatGPT 或 Claude。
  implementation: 按规范保持
  evidence: 见程序与测试
- id: HUMAN-001
  level: MUST
  category: 真人操作
  text: 所有会改变网站状态的点击、输入、导航、上传、发送和标签切换必须直接对应用户当下操作。
  implementation: 已实现
  evidence: 消息协议仅转发手机当下操作；没有业务动作调度器
- id: HUMAN-002
  level: MUST
  category: 禁止无人值守
  text: 不得新增宏、定时任务、批量提问、自动发送、自动重试、自动继续或后台无人值守操作。
  implementation: 已实现
  evidence: 无宏、队列、定时发送或自动重试业务逻辑
- id: HUMAN-003
  level: MUST
  category: 禁止内容提取
  text: 不得自动读取、解析、抓取、保存或批量导出 ChatGPT/Claude 的提示词、回答正文或页面 DOM。
  implementation: 已实现
  evidence: 画面为 JPEG/截图；没有聊天正文解析/导出逻辑
- id: HUMAN-004
  level: MUST
  category: 禁止绕过
  text: 不得绕过验证码、速率限制、用量限制、安全措施、账号保护或平台策略。
  implementation: 按规范保持
  evidence: 见程序与测试
- id: HUMAN-005
  level: MUST
  category: 禁止伪装
  text: 不得修改 navigator.webdriver、User-Agent、Client Hints、平台、时区、Canvas、WebGL、AudioContext、字体、插件或其他指纹；不得加入 stealth 方案。
  implementation: 已实现
  evidence: 严格模式无 UA/Client Hints/指纹覆盖；manual-compatibility.test.js 覆盖
- id: HUMAN-006
  level: MUST
  category: 风险表述
  text: 不得宣称 100% 安全、完全不可检测、平台明确批准或零封禁风险。
  implementation: 按规范保持
  evidence: 见程序与测试
- id: SITE-001
  level: MUST
  category: 严格站点
  text: 严格人工模式自动匹配 chatgpt.com、chat.openai.com、auth.openai.com、claude.ai、claude.com 及其子域。
  implementation: 已实现
  evidence: manualCompatibilityDomains 精确配置与域名自动判断
- id: SITE-002
  level: MUST
  category: 精确域名
  text: 不得把整个 openai.com 或 anthropic.com 泛化为严格站点；普通文档和帮助页不应无必要改变输入模式。
  implementation: 已实现
  evidence: 默认列表不含整个 openai.com / anthropic.com
- id: STRICT-001
  level: MUST
  category: 桌面身份
  text: 严格人工模式保持真实 Windows Edge 身份，清除本控制器施加的移动设备指标，不做 Android 指纹仿真。
  implementation: 已实现
  evidence: 清除设备指标和触摸仿真；保留真实 Edge 身份
- id: STRICT-002
  level: MUST
  category: 真实窄窗口
  text: 严格人工模式通过真实 Edge 窗口尺寸获得窄布局，默认 560×960；退出时尽力恢复原窗口位置、大小和最大化状态。
  implementation: 已实现/需 Windows 验证
  evidence: Browser.getWindowBounds/setWindowBounds；退出恢复
- id: STRICT-003
  level: MUST
  category: 默认输入
  text: 严格人工模式默认将轻点映射为鼠标点击、上下拖动映射为滚轮、文字映射为明确的键盘/文本输入。
  implementation: 已实现
  evidence: 严格模式 mouse/wheel/keyboard 默认；测试覆盖
- id: STRICT-004
  level: MUST
  category: 临时原生触摸
  text: 原生触摸只作为用户明确开启的临时通道，用于 Canvas、地图、滑块或按住拖拽；不得在严格站点默认启用。
  implementation: 已实现
  evidence: 手机明确开关 strictNativeTouch；默认 false
- id: STRICT-005
  level: MUST
  category: 最小 CDP 面
  text: 严格模式空闲时不长期启用 Runtime、DOM 或文件选择拦截；仅保留 Target/Page/Input 与画面通道所需能力。
  implementation: 已实现
  evidence: 附加后仅 Page.enable；Runtime/DOM/chooser 按需；测试断言空闲不启用
- id: STRICT-006
  level: MUST
  category: 环境审计
  text: 网页环境审计只能由用户在设置中明确点击后运行一次；打开设置不能自动执行 Runtime.evaluate。
  implementation: 已实现
  evidence: 环境审计按钮触发；打开设置不自动审计
- id: STRICT-007
  level: MUST
  category: 本地校准
  text: 校准标记、测试十字和命中提示只能画在手机控制页，不得向 ChatGPT、Claude 或其他目标网页注入 DOM、脚本或样式。
  implementation: 已实现
  evidence: 校准全部在手机覆盖层；目标页无校准脚本
- id: STRICT-008
  level: MUST
  category: 按需上传
  text: 严格站点文件选择需由用户先点击控制器“上传”武装，再点击网页上传按钮；完成、取消、换页或超时后关闭拦截。
  implementation: 已实现
  evidence: 顶部上传武装 90 秒；短暂拦截；结束后关闭
- id: NAV-001
  level: MUST
  category: 标签跟随
  text: 电脑在 Edge 内切换标签时手机可跟随；电脑切到其他应用时必须保持当前手机标签。
  implementation: 已实现/需 Windows 真机验证
  evidence: EdgeUiaMonitor + PowerShell UIA helper；非 Edge 前台保持当前标签
- id: NAV-002
  level: MUST
  category: UI Automation
  text: 默认通过 Windows UI Automation 读取前台 Edge 的选中标签和地址栏；严格模式不得自动回退为 document.hasFocus 脚本轮询。
  implementation: 已实现/需 Windows 真机验证
  evidence: desktopTabFollowStrategy=uia；strictRuntimeTabFallback=false
- id: NAV-003
  level: MUST
  category: 保守匹配
  text: UIA 地址或标题匹配不唯一时不得猜测，必须保持当前标签并允许手机手动切换。
  implementation: 已实现
  evidence: chooseTargetFromUia 只接受唯一地址/标题匹配；单元测试覆盖歧义
- id: NAV-004
  level: MUST
  category: 手机主动切换
  text: 用户在手机标签面板明确选中标签时，允许激活对应 Edge 标签页。
  implementation: 已实现
  evidence: 手机 selectTarget 可激活目标
- id: WIN-001
  level: MUST
  category: 专用窗口
  text: 手机专用窗口为可选模式，默认关闭；开启后控制器在同一 Edge 配置下新开独立窄窗口专供手机操作，继承同一 Cookie/登录/扩展/会话，不改动电脑主窗口；退出或点关闭按钮即清理该窗口内标签，主窗口标签必须存活。
  implementation: 已实现
  evidence: setDedicatedWindow/ensureDedicatedWindow；同 profile newWindow；关闭清理
- id: WIN-002
  level: MUST
  category: 专用窗口保守
  text: 专用窗口模式下标签面板与 UIA 跟随只作用于专用窗口内的标签集合；集合外的前台标签不得触发切换，歧义仍保持当前标签；专用窗口由控制器创建，不参与严格模式的窗口尺寸保存与恢复。
  implementation: 已实现
  evidence: dedicatedTargetIdSet + chooseTargetFromUia allowedTargetIds；windows-edge-uia.test.js
- id: HIST-001
  level: MUST
  category: 全局历史
  text: 提供类似 Edge 历史侧栏的本地全局历史：按访问时间倒序、日期分组、搜索、当前/新标签打开。
  implementation: 已实现
  evidence: lib/edge-history.js；本地 History SQLite 只读副本；集成测试
- id: HIST-002
  level: MUST
  category: 会话历史
  text: 保留当前标签页精确前进/后退历史，与全局历史明确区分。
  implementation: 已实现
  evidence: Page.getNavigationHistory / navigateToHistoryEntry
- id: FILE-001
  level: MUST
  category: 电脑文件
  text: 网页上传默认浏览 Windows 电脑文件，直接把用户确认的原文件路径交给 Edge，不要求先传到手机。
  implementation: 已实现/需 Windows 真机验证
  evidence: lib/computer-files.js + DOM.setFileInputFiles；真实 Chromium 测试
- id: FILE-002
  level: MUST
  category: 排序
  text: 电脑文件默认按更改时间最新优先，并可切换时间、名称和大小排序。
  implementation: 已实现
  evidence: computerFileSort=modified-desc；前端排序选项；单元测试
- id: FILE-003
  level: MUST
  category: 显式确认
  text: 文件上传必须由用户显式选择和确认；不得后台扫描内容、自动选择或自动上传。
  implementation: 已实现
  evidence: 文件列表与提交分离，用户确认后才 setFileInputFiles
- id: FILE-004
  level: MUST
  category: 手机文件备用
  text: 保留 Android 文件上传作为备用；分块传输、取消、大小限制和临时文件清理必须安全。
  implementation: 已实现
  evidence: 手机分块上传、限额、取消和临时文件清理
- id: UX-001
  level: MUST
  category: 画面稳定
  text: 使用最新帧优先、逐帧确认、旧帧丢弃、最后帧保留和截图兜底，避免闪烁、黑屏和多秒积压。
  implementation: 已实现
  evidence: frameAck、latest frame、snapshot fallback、分级恢复；模拟与真实 Chromium 测试
- id: UX-002
  level: MUST
  category: 等比显示
  text: 网页画面只能等比缩放，不得横纵分别拉伸。
  implementation: 已实现
  evidence: Canvas/图像统一比例绘制；静态和几何测试
- id: UX-003
  level: MUST
  category: 坐标同帧
  text: 触摸坐标必须绑定产生当前画面的同一帧几何；手势开始后冻结目标、视口修订和校准直到抬手。
  implementation: 已实现
  evidence: 同帧 geometry、viewport revision、gesture freeze
- id: UX-004
  level: MUST
  category: 独立校准
  text: 普通/全屏、竖屏/横屏分别保存校准；手动位移为主，比例默认 100%。
  implementation: 已实现
  evidence: 四套 profile + 本地三点/五点/手动微调
- id: UX-005
  level: MUST
  category: 顶部可点
  text: 网页第一行、四角和边缘不得存在整条死区。
  implementation: 已实现
  evidence: 顶部边界夹取与真实 Chromium 顶部第一行测试
- id: UX-006
  level: MUST
  category: 全屏可操作
  text: 沉浸全屏保留可拖动悬浮工具，至少含后退、前进、刷新、标签、输入、上传、鼠标/触摸、校准、设置和退出。
  implementation: 已实现
  evidence: 全屏本地悬浮工具
- id: UX-007
  level: MUST
  category: 通用触摸偏好
  text: 非严格站点默认保留用户偏好的直接触摸与拖拽、原生触摸事件。
  implementation: 已实现
  evidence: 通用模式默认 direct + native touch
- id: UX-008
  level: MUST
  category: 静止高清
  text: 页面持续无新帧且无输入超过阈值后，用无损 PNG 补拍替换最后一帧提升清晰度；任何输入或新帧立即回到实时流。补拍只用 Page 域被动截图（captureScreenshot/getLayoutMetrics），不执行页面脚本、不启用 Runtime/DOM、不激活或置顶窗口、不注入内容；补拍帧不再触发补拍，失败不进入重启恢复流程。
  implementation: 已实现
  evidence: maybeIdleSharpen 只用 Page.captureScreenshot(png)+getLayoutMetrics；noActivate；idle-sharpen.test.js 与真实 Chromium 覆盖
- id: CLIP-001
  level: MUST
  category: 剪贴板显式
  text: 电脑剪贴板读取与写入只能由用户在手机控制页当次显式触发，单次、双向；不得轮询、监听、自动同步或后台读取。
  implementation: 已实现
  evidence: clipboardGet/clipboardSet 请求-应答；无轮询路径；windows-clipboard.test.js
- id: CLIP-002
  level: MUST
  category: 剪贴板边界
  text: 剪贴板桥经 PowerShell Get-Clipboard/Set-Clipboard 在浏览器之外实现，不触碰目标网页、不使用 CDP Runtime、不解析内容、不落盘、不记录正文（仅记录字符数）；超过大小上限必须明确拒绝，不得静默截断。
  implementation: 已实现
  evidence: lib/windows-clipboard.js PowerShell Get/Set-Clipboard；不落盘/不记录正文；超限拒绝
- id: REL-001
  level: MUST
  category: 断线安全
  text: 断线、重连、切标签、尺寸改变时释放按下状态并丢弃旧输入，不得重放点击、按键或提交。
  implementation: 已实现
  evidence: 连接代际、release input、旧视口拒绝、帧代际
- id: REL-002
  level: MUST
  category: Edge 恢复
  text: Edge 退出或 DevToolsActivePort 失效时可恢复浏览器连接，但不得自动重发用户输入或表单。
  implementation: 已实现/需 Windows 验证
  evidence: 残留端口识别、Edge 自动恢复、CDP 单重连流程
- id: SEC-001
  level: MUST
  category: 单一控制者
  text: 同一时刻只允许一个手机会话控制；接管前释放旧鼠标和触摸状态。
  implementation: 已实现
  evidence: single controller role + takeover cleanup
- id: SEC-002
  level: MUST
  category: 局域网
  text: 控制器端口只允许 LocalSubnet，使用令牌/会话；不得映射到公网。
  implementation: 已实现/需 Windows 验证
  evidence: LocalSubnet 防火墙脚本、令牌和同源检查
- id: PRIV-001
  level: MUST
  category: 最少持久化
  text: 默认不落盘保存网页帧、截图、提示词、回答、剪贴板内容或电脑文件内容。
  implementation: 已实现
  evidence: 帧仅内存；发布包清理日志、令牌和临时文件
- id: PRIV-002
  level: MUST
  category: 诊断脱敏
  text: 诊断包不包含令牌、Cookie、凭据、上传文件内容、剪贴板正文或网页正文；页面标题/网址日志必须明确提示可能敏感。
  implementation: 已实现
  evidence: 诊断脚本脱敏令牌/CDP ID；明确日志可能含标题/网址
- id: REL-003
  level: MUST
  category: 完整交付
